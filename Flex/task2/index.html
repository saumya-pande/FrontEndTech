<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Contact Us</h1>
        <form>
            <div class="form-row">
                <div class="form-group">
                    <label for="firstname">First Name <span>*</span></label> 
                    <input type="text" id="firstname" name="firstname" required>
                </div>
                <div class="form-group">
                    <label for="lastname">Last Name <span>*</span></label>
                    <input type="text" id="lastname" name="lastname" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address <span>*</span></label> 
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Query Type <span>*</span></label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="general-enquiry" name="req" required>
                        <label for="general-enquiry">General Enquiry</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="support-request" name="req" required>
                        <label for="support-request">Support Request</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="message">Message <span>*</span></label>
                <textarea id="message" name="message" required></textarea>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I consent to being contacted by the team <span>*</span></label>
            </div>

            <button type="submit" class="submitbutton">Submit</button>
        </form>
    </div>

</body>

</html>
