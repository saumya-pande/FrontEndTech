<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="container">
        <div>
            <div class="logo">
                <i class="far fa-sun fa-2x" style="color: rgb(160, 95, 9);"></i>
                <h2>Weather Now</h2>
            </div>
        </div>
        <div class="dropdown-temp">
            <label for="toggle-temp" class="dropdown-label">
                <i class="fa-solid fa-gear" style="color: whitesmoke"></i>
                <span>Units</span>
                <i class="fa-solid fa-angle-down"></i>
            </label>

            <input type="checkbox" id="toggle-temp">

            <div class="dropdown-menu">
                <a href="#" onclick="setUnit('C')">Celsius</a>
                <a href="#" onclick="setUnit('F')">Fahrenheit</a>
                <a href="#" onclick="setUnit('K')">Kelvin</a>
            </div>
        </div>
    </div>


    <div class="heading">
        <div>How's the sky looking today?</div>
    </div>


    <div class="gridstuff">
        <div> 
            <form>
                <label for="search"><i class="fa-solid fa-magnifying-glass"></i></label> 
                <input type="text" placeholder="Search for a place..." id="search">
            <div>

            </div>
            </form>
        </div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>

</html>
