<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biriyani</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    
    <h1>Ingredients for Biriyani</h1>
    <div>
        <ul type="disc">
            <li>Rice</li>
            <li>
                Chicken
                <ul type="circle">
                    <li>Fried</li>
                    <li>Roasted</li>
                    <li>Grilled</li>
                </ul>
            </li>
            <li class="paneer">Paneer</li>
        </ul>
    </div>
    <h1>Fighter Jet</h1>
    <div>
        <ul type="disc">
            <li>Spices</li>
            <li>Gas/Electric</li>
        </ul>
    </div>
    <h1>Ingredients for Lassi</h1>
    <div>
        <ul type="disc" class="lassi">
            <li>Curd</li>
            <li>Water</li>
            <li>Sugar
                <ul type="circle">
                    <li>White Sugar</li>
                    <li>Brown Sugar</li>
                </ul>
            </li>
            <li>Malai</li>
            <li>Kova</li>
            
        </ul>
    </div>
</body>
</html>
