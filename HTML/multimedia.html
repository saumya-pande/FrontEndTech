<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Uploads</title>
</head>

<body>
    <video src="Videos\Val1.mp4" controls muted loop height="300px" width="500px">
    </video>

    <br>

    <audio src="Audio\final-and-loop-piko-piko-electro-beat-20991.mp3" controls></audio>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/xMgkJ4dwF10?si=T9Uu1sBtiYyw0Gq2"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
    </iframe>


    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4554.252505804977!2d75.69958631289062!3d31.25254387986065!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x391a5f89fb030215%3A0x827c0e5e768c8394!2sPIZZA%20VIRUS!5e0!3m2!1sen!2sin!4v1775119471291!5m2!1sen!2sin"
        width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
    </iframe>

    <hr> <br>

    <h1> QR </h1>
    <img src=" https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.reddit.com/r/bloodborne/"
        alt="">

    <br><br>

    <fieldset legend="Registration Form">
        <legend><mark>Registration Form</mark></legend>
    <form action="" method="get">
        <label for="nameid">Name : </label>
        <input type="text" name="username" id="nameid" placeholder="Name" required>
        <br> <br>

        <label for="emailid">Email : </label>
        <input type="email" name="email" id="emailid" placeholder="Email">
        <br><br>

        <label for="phoneid">Phone Number : </label>
        <input type="tel" name="phone" id="phoneid" placeholder="Phone Number" minlength="10" maxlength="10">
        <br><br>

        <label for="gender">Gender : </label>
        <input type="radio" name="gender" id="male" value="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female" value="female">
        <label for="female">Female</label>
        <br><br>

        <label for="">Skills</label>
        <br><br>

        <label for="html">HTML</label>
        <input type="checkbox" name="skills" id="html" value="html" checked>
        <label for="css">CSS</label>
        <input type="checkbox" name="skills" id="css" value="css" checked>
        <label for="js">JavaScript</label>
        <input type="checkbox" name="skills" id="js" value="js" checked>
        <label for="react">React</label>
        <input type="checkbox" name="skills" id="react" value="react">
        <br><br>

        <label for="resume">Resume : </label>
        <input type="file" name="resume" id="resume" accept=".pdf, .png">
        <br><br>

        <label for="doj">Joining Date : </label>
        <input type="date" id="doj" name="doj" min="2026-05-01" max="2026-05-15">
        <br><br>

        <label for="branch">Branch : </label>
        <select name="branch" id="branch">
            <option value="cse">CSE</option>
            <option value="ece">ECE</option>
            <option value="mech">MECH</option>
            <option value="civil">CIVIL</option>
        </select>
        <br><br>

        <label for="course">Course : </label>
        <select name="" id="course">
            <optgroup label="Management">
                <option value="">BBA</option>
                <option value="">MBA</option>
            </optgroup>
            <optgroup label="Engineering">
                <option value="">BE</option>
                <option value="">ME</option>
                <option value="">AE</option>
                <option value="">CE</option>
            </optgroup>
        </select>
        <br><br>

        <details open>
            <summary>Upcoming Drives</summary>
            <p>Bethesda</p>
            <p>Rockstar Games</p>
            <p>Activision Blizzard</p>
            <p>Electronic Arts</p>
        </details>
        <br><br>

        <label>Experience</label>
        <input type="range" name="" id="" step="20">
        <br><br>

        <label>Time : </label>
        <input type="time" name="" id="">
        <br><br>

        <input type="color" name="" id="">
        <br><br>
        <input type="reset" name="" id="">
        <input type="submit" name="" id="">

        <br><br>
        <label for="feedback">Feedback : </label>
        <textarea name="" id="feedback"></textarea>
        <br><br>

        <label>Fees : </label>
        <input type="text" name="" id="" value="20k" readonly>
        <!-- <button type="submit">Submit</button> -->
        <br><br>

    </form>
    </fieldset>

</body>

</html>
