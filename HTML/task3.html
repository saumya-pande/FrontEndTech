<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="">Name*</label>
        <input type="text" name="" id="" required>
        <br><br>
        <label for="">Address</label>
        <textarea name="" id=""></textarea>
        <br><br>
        <label for="">Zip Code*</label>
        <input type="text" name="" id="" placeholder="enter a 5-digit code" minlength="5" maxlength="5"  required>
        <br><br>
        <label for="">Country*</label>
        <select required>
        <option value="">Please select...</option>
        <option>India</option>
        <option>USA</option>
        <option>UK</option>
        </select>
        <br><br>
        <label for="gender">Gender*</label> <br>
        <label for="male">Male</label>
        <input type="radio" name="gender" id="male" value="male">
        <label for="female">Female</label>
        <input type="radio" name="gender" id="female" value="female">
        <br><br>
        <label for="">Preferences*</label>
        <label for="Red">Red</label>
        <input type="checkbox" name="" id="Red" value="Red">
        <label for="Blue">Blue</label>
        <input type="checkbox" name="" id="Blue" value="Blue">
        <label for="Green">Green</label>
        <input type="checkbox" name="" id="Green" value="Green">
        <br><br>
        <label for="">Phone*</label>
        <input type="tel" name="" id="" minlength="10" maxlength="10" required>
        <br><br>
        <label for="mail">Email*</label>
        <input type="email" name="" id="" required>
        <br><br>
        <label for="">Password*</label>
        <input type="password" name="" id="" placeholder="6-8 characters" minlength="6" maxlength="8" required>
        <br><br>
        <label for="">Verify Password*</label>
        <input type="password" name="" id="" required>
        <br><br>
        <label for="">Birthday*</label>
        <input type="date" name="" id="" required>
        <br><br>
        <label for="">Appointment*</label>
        <input type="time" name="" id="" required>
        <br><br>
        <button type="submit">SEND</button>
        <button type="reset">CLEAR</button>
    </form>
</body>
</html>
