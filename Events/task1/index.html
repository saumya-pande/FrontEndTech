<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Task</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="mid">

        <button id="btn-add" onclick="increment()">+</button>
        <p id="count" style="border: 2px solid grey; padding: 5px; width: 30px">0</p>
        <button id="btn-subtract" onclick="decrement()">-</button>
        <br><br>
    </div>
    <button id="btn-reset" onclick="reset()">RESET</button>
    <script src="script.js">

    </script>
</body>

</html>
